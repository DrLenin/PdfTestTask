services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pdf_processing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf_processing"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: src/PdfProcessing.ApiGateway/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pdf_processing;Username=postgres;Password=postgres
      PdfStorage__UploadDirectory: /data/uploads
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: pdf-processing
    ports:
      - "8080:8080"
    volumes:
      - uploaded-pdfs:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  background-worker:
    build:
      context: .
      dockerfile: src/PdfProcessing.BackgroundWorker/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pdf_processing;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: pdf-processing
    volumes:
      - uploaded-pdfs:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  uploaded-pdfs:
